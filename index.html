<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هشام & وجدان — إدارة دعوات الزفاف</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ivory: #FDF8F5;
      --gold: #B76E79;
      --gold-light: #E8C4C8;
      --gold-dark: #8C4A52;
      --champagne: #F9ECEE;
      --charcoal: #3D2C2E;
      --white: #FFFFFF;
      --green: #6B8F71;
      --green-bg: #EDF3EE;
      --red: #C06070;
      --red-bg: #FBF0F1;
      --blue: #7B9BAA;
      --blue-bg: #EFF4F6;
      --orange: #C4956A;
      --orange-bg: #FBF3EC;
      --gray: #A89A9C;
      --gray-light: #FAF6F5;
      --shadow: 0 2px 16px rgba(183,110,121,0.08);
      --shadow-lg: 0 8px 32px rgba(183,110,121,0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', 'Inter', sans-serif;
      background: linear-gradient(170deg, #FFFFFF 0%, #FEF7F4 20%, #FCF0EC 45%, #FDF5F2 70%, #FFFAF8 100%);
      background-attachment: fixed;
      color: var(--charcoal);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    [dir="ltr"] body { font-family: 'Inter', 'Cairo', sans-serif; }

    /* ===== FALLING PETALS CANVAS ===== */
    #petals-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: var(--white);
      border: 2px solid var(--gold);
      color: var(--gold-dark);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: var(--transition);
      font-family: inherit;
    }

    [dir="rtl"] .lang-toggle { right: auto; left: 16px; }
    .lang-toggle:hover { background: var(--gold); color: var(--white); }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 35px 20px 0;
      position: relative;
      z-index: 2;
    }

    .canvas-container {
      width: 100%;
      max-width: 420px;
      height: 220px;
      margin: 0 auto;
    }

    .canvas-container canvas { display: block; width: 100%; height: 100%; }

    /* ===== CIRCULAR COUNTDOWN ===== */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 15px 0 20px;
      flex-wrap: wrap;
    }

    .countdown-ring {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .countdown-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .countdown-ring .ring-bg {
      fill: none;
      stroke: var(--champagne);
      stroke-width: 4;
    }

    .countdown-ring .ring-fill {
      fill: none;
      stroke: var(--gold);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }

    .countdown-ring-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .countdown-ring-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-dark);
      font-family: 'Playfair Display', serif;
      line-height: 1;
    }

    .countdown-ring-label {
      font-size: 9px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .wedding-day-msg {
      font-size: 28px;
      color: var(--gold-dark);
      font-weight: 700;
      margin: 20px 0 30px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 15px;
      max-width: 250px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    }

    .divider-icon { color: var(--gold); font-size: 18px; }

    /* ===== MAIN CONTENT ===== */
    .tabs-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px 20px;
      position: relative;
      z-index: 2;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .tab-btn {
      padding: 8px 24px;
      border: 2px solid var(--gold);
      background: var(--white);
      color: var(--gold-dark);
      font-size: 14px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .tab-btn.active { background: var(--gold); color: var(--white); }
    .tab-btn:hover:not(.active) { background: var(--champagne); }

    .toolbar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1px solid var(--gold-light);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition);
      background: var(--white);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(183, 110, 121, 0.12);
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .btn-gold { background: var(--gold); color: var(--white); }
    .btn-gold:hover { background: var(--gold-dark); }
    .btn-outline { background: var(--white); color: var(--gold-dark); border: 1px solid var(--gold); }
    .btn-outline:hover { background: var(--champagne); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-danger:hover { background: #A04050; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
      justify-content: center;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      box-shadow: var(--shadow);
      border: 1px solid #f5eded;
    }

    .stat-chip .stat-num {
      font-weight: 700;
      font-size: 16px;
      font-family: 'Playfair Display', serif;
    }

    .stat-chip .stat-label {
      color: var(--gray);
      font-size: 11px;
    }

    .stat-chip.green .stat-num, .stat-chip.green .stat-label { color: var(--green); }
    .stat-chip.red .stat-num, .stat-chip.red .stat-label { color: var(--red); }
    .stat-chip.blue .stat-num, .stat-chip.blue .stat-label { color: var(--blue); }
    .stat-chip.orange .stat-num, .stat-chip.orange .stat-label { color: var(--orange); }
    .stat-chip.default .stat-num { color: var(--gold-dark); }

    .table-wrapper {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .guest-table { width: 100%; border-collapse: collapse; }

    .guest-table th {
      background: var(--champagne);
      padding: 14px 16px;
      text-align: start;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .guest-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f5eded;
      font-size: 14px;
      vertical-align: middle;
    }

    .guest-table tr:last-child td { border-bottom: none; }
    .guest-table tr:hover td { background: rgba(249, 236, 238, 0.4); }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-blue { background: var(--blue-bg); color: var(--blue); }
    .badge-orange { background: var(--orange-bg); color: var(--orange); }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
      display: inline-block;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--gold-light);
      border-radius: 24px;
      transition: var(--transition);
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: var(--white);
      border-radius: 50%;
      transition: var(--transition);
    }

    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    [dir="rtl"] .toggle-slider::before { left: auto; right: 3px; }
    [dir="rtl"] .toggle input:checked + .toggle-slider::before { transform: translateX(-20px); }

    .children-container { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    .child-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--champagne);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .child-chip .remove-child {
      cursor: pointer;
      color: var(--red);
      font-size: 14px;
      font-weight: bold;
      border: none;
      background: none;
      padding: 0 2px;
      line-height: 1;
    }

    .add-child-inline { display: inline-flex; gap: 4px; align-items: center; }

    .add-child-inline input {
      width: 100px;
      padding: 3px 8px;
      border: 1px solid var(--gold-light);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
    }

    .add-child-inline input:focus { outline: none; border-color: var(--gold); }

    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--gold-dark);
      transition: var(--transition);
      padding: 4px;
    }

    .expand-btn:hover { color: var(--gold); }
    .children-row { display: none; }
    .children-row.open { display: table-row; }
    .children-row td { background: var(--gray-light); padding: 10px 16px 10px 40px; }
    [dir="rtl"] .children-row td { padding: 10px 40px 10px 16px; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 44, 46, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold-dark);
      margin-bottom: 24px;
      font-size: 22px;
    }

    [dir="rtl"] .modal h2 { font-family: 'Tajawal', serif; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--charcoal);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gold-light);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(183, 110, 121, 0.12);
    }

    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-children { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    [dir="rtl"] .modal-actions { justify-content: flex-start; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

    .loading { text-align: center; padding: 40px; color: var(--gray); }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--champagne);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    [dir="rtl"] .toast-container { right: auto; left: 20px; }

    .toast {
      background: var(--charcoal);
      color: var(--white);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 350px;
    }

    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 44, 46, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
    }

    .confirm-overlay.active { display: flex; }

    .confirm-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }

    .confirm-box p { margin-bottom: 20px; font-size: 16px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    .file-input-hidden { display: none; }

    .floral-bottom {
      text-align: center;
      color: var(--gold-light);
      font-size: 24px;
      opacity: 0.6;
      letter-spacing: 8px;
      user-select: none;
      margin-top: 30px;
      padding-bottom: 20px;
    }

    .error-banner {
      background: var(--red-bg);
      color: var(--red);
      padding: 10px 20px;
      text-align: center;
      font-size: 13px;
      display: none;
      position: relative;
      z-index: 2;
    }

    .error-banner.show { display: block; }

    /* ===== MOBILE CARD VIEW ===== */
    .mobile-cards { display: none; }

    @media (max-width: 768px) {
      .hero { padding: 25px 12px 0; }
      .canvas-container { height: 180px; }
      .countdown { gap: 8px; margin: 10px 0 14px; }
      .countdown-ring { width: 60px; height: 60px; }
      .countdown-ring-number { font-size: 16px; }
      .countdown-ring-label { font-size: 8px; }
      .tabs-container { padding: 0 10px 20px; }
      .tab-btn { padding: 7px 16px; font-size: 13px; }
      .toolbar { gap: 5px; }
      .search-input { min-width: auto; flex: 1; min-width: 120px; }
      .summary-bar { gap: 5px; }
      .stat-chip { padding: 4px 10px; font-size: 11px; }
      .stat-chip .stat-num { font-size: 14px; }

      .table-wrapper { display: none; }
      .mobile-cards { display: block; }
      .modal { padding: 24px 20px; max-height: 85vh; }
    }

    .guest-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid #f5eded;
    }

    .guest-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      gap: 8px;
    }

    .guest-card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--charcoal);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .guest-card-badges {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .guest-card-body {
      padding: 0 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .guest-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .guest-card-label {
      color: var(--gray);
      font-size: 11px;
      font-weight: 600;
    }

    .guest-card-value {
      color: var(--charcoal);
      font-size: 13px;
    }

    .guest-card-toggles {
      display: flex;
      gap: 16px;
      padding: 8px 0;
    }

    .guest-card-toggle-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--gray);
    }

    .guest-card-notes {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      padding: 4px 0;
      border-top: 1px solid #f9f3f3;
    }

    .guest-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--gray-light);
      border-top: 1px solid #f5eded;
    }

    .guest-card-actions {
      display: flex;
      gap: 6px;
    }

    .guest-card-children {
      padding: 8px 14px 10px;
      background: var(--gray-light);
      border-top: 1px solid #f5eded;
    }

    .guest-card-expand {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .guest-card-children-content {
      display: none;
    }

    .guest-card-children-content.open {
      display: block;
    }

    @media (max-width: 400px) {
      .countdown-ring { width: 52px; height: 52px; }
      .countdown-ring-number { font-size: 14px; }
      .countdown { gap: 6px; }
      .stat-chip { padding: 3px 8px; }
      .stat-chip .stat-num { font-size: 13px; }
      .stat-chip .stat-label { font-size: 10px; }
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 0;
      flex-wrap: wrap;
    }
    .pagination button {
      min-width: 36px;
      height: 36px;
      border: 1px solid #e0d5d0;
      background: var(--white);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--charcoal);
      transition: all 0.2s;
    }
    .pagination button:hover { background: var(--cream); }
    .pagination button.active {
      background: var(--gold);
      color: var(--white);
      border-color: var(--gold);
      font-weight: 700;
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pagination .page-info {
      font-size: 13px;
      color: var(--muted);
      margin: 0 4px;
    }
    .pagination select {
      height: 36px;
      border: 1px solid #e0d5d0;
      border-radius: 8px;
      padding: 0 8px;
      font-size: 13px;
      background: var(--white);
      color: var(--charcoal);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Falling Petals (full page) -->
  <canvas id="petals-canvas"></canvas>

  <!-- Language Toggle -->
  <button id="lang-toggle" class="lang-toggle">EN</button>

  <!-- Error Banner -->
  <div id="error-banner" class="error-banner"></div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="canvas-container">
      <canvas id="monogram-canvas"></canvas>
    </div>
    <div class="countdown" id="countdown"></div>
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">💍</span>
      <span class="divider-line"></span>
    </div>
  </section>

  <!-- Main Content -->
  <div class="tabs-container">
    <div class="tabs">
      <button id="groom-tab" class="tab-btn active">قائمة العريس</button>
      <button id="bride-tab" class="tab-btn">قائمة العروس</button>
    </div>

    <div class="summary-bar" id="summary-cards"></div>

    <div class="toolbar">
      <input type="text" id="search-input" class="search-input" placeholder="بحث...">
      <button id="add-guest-btn" class="btn btn-gold"><span>+</span> إضافة مدعو</button>
      <button id="import-btn" class="btn btn-outline">استيراد من Excel</button>
      <button id="export-btn" class="btn btn-outline">تصدير إلى Excel</button>
      <button id="template-btn" class="btn btn-outline">تحميل القالب</button>

  const simplePetalVariants = [
    { color: "#E8BFC4", accent: "#F5DFE2" },
    { color: "#F0CDD2", accent: "#FAE8EB" },
    { color: "#DCABAF", accent: "#F0D0D3" },

  const flowerColors = ["#E8C4C8", "#D4A0A8", "#C98A92", "#F0CDD2", "#DCABAF"];

  function loadPetalImages() {
    const simplePromises = simplePetalVariants.map(v => new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve({ img, type: "simple" });
      img.onerror = () => resolve(null);
      img.src = createSimplePetalSVG(v.color, v.accent);
    }));

    const flowerPromises = flowerColors.map(c => new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve({ img, type: "flower" });
      img.onerror = () => resolve(null);
      img.src = createFlowerSVG(c);
    }));

    return Promise.all([...simplePromises, ...flowerPromises]);
  }

  class Petal {
    constructor(w, h, simpleImgs, flowerImgs) {
      this.cW = w; this.cH = h;
      this.simpleImgs = simpleImgs;
      this.flowerImgs = flowerImgs;
      this.reset(true);
    }
    reset(init) {
      this.x = Math.random() * this.cW;
      this.y = init ? -Math.random() * this.cH : -40 - Math.random() * 100;
      // 70% simple petals, 30% user's flower SVG
      this.isFlower = Math.random() < 0.3 && this.flowerImgs.length > 0;
      if (this.isFlower) {
        this.img = this.flowerImgs[Math.floor(Math.random() * this.flowerImgs.length)];
        this.size = Math.random() * 14 + 8;
        this.rotSpeed = (Math.random() - 0.5) * 0.018;
        this.opacity = Math.random() * 0.25 + 0.08;
        this.speedY = Math.random() * 0.5 + 0.15;
      } else {
        this.img = this.simpleImgs[Math.floor(Math.random() * this.simpleImgs.length)];
        this.size = Math.random() * 18 + 10;
        this.rotSpeed = (Math.random() - 0.5) * 0.012;
        this.opacity = Math.random() * 0.35 + 0.1;
        this.speedY = Math.random() * 0.6 + 0.2;
      }
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.rotation = Math.random() * Math.PI * 2;
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.015 + 0.005;
      this.wobbleAmp = Math.random() * 0.6 + 0.2;
      this.flipSpeed = Math.random() * 0.008 + 0.003;
      this.flipPhase = Math.random() * Math.PI * 2;
    }
    update() {
      this.y += this.speedY;
      this.wobble += this.wobbleSpeed;
      this.flipPhase += this.flipSpeed;
      this.x += this.speedX + Math.sin(this.wobble) * this.wobbleAmp;
      this.rotation += this.rotSpeed;
      if (this.y > this.cH + 50) this.reset(false);
    }
    draw(ctx) {
      if (!this.img) return;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      const scaleX = this.isFlower ? 1 : (Math.cos(this.flipPhase) * 0.6 + 0.4);
      ctx.scale(scaleX, 1);
      ctx.globalAlpha = this.opacity;
      if (this.isFlower) {
        ctx.drawImage(this.img, -this.size / 2, -this.size / 2, this.size, this.size);
      } else {
        ctx.drawImage(this.img, -this.size / 2, -this.size * 0.6, this.size, this.size * 1.2);
      }
      ctx.restore();
    }
  }

  async function initPetals() {
    petalsCanvas = document.getElementById("petals-canvas");
    petalsCtx = petalsCanvas.getContext("2d");
    resizePetals();
    const allImgs = (await loadPetalImages()).filter(Boolean);
    const simpleImgs = allImgs.filter(i => i.type === "simple").map(i => i.img);
    const flowerImgs = allImgs.filter(i => i.type === "flower").map(i => i.img);
    if (simpleImgs.length === 0 && flowerImgs.length === 0) return;
    const count = Math.min(Math.floor(window.innerWidth * 0.035), 30);
    for (let i = 0; i < count; i++) petals.push(new Petal(window.innerWidth, window.innerHeight, simpleImgs, flowerImgs));
    window.addEventListener("resize", resizePetals);
    animatePetals();
  }

  function resizePetals() {
    const dpr = window.devicePixelRatio || 1;
    petalsCanvas.width = window.innerWidth * dpr;
    petalsCanvas.height = window.innerHeight * dpr;
    petalsCanvas.style.width = window.innerWidth + "px";
    petalsCanvas.style.height = window.innerHeight + "px";
    petalsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    petals.forEach(p => { p.cW = window.innerWidth; p.cH = window.innerHeight; });
  }

  function animatePetals() {
    petalsCtx.clearRect(0, 0, petalsCanvas.width, petalsCanvas.height);
    petals.forEach(p => { p.update(); p.draw(petalsCtx); });
    requestAnimationFrame(animatePetals);
  }

  // ==========================================
  // HEART + MONOGRAM ANIMATION
  // ==========================================
  let hCanvas, hCtx, hW = 0, hH = 0;
  let animPhase = 0; // 0=drawing heart, 1=pulse, 2=fade+show initials
  let animTime = 0;
  let heartProgress = 0;
  let heartPulse = 0;
  let heartOpacity = 1;
  let initialsOpacity = 0;
  let initialsScale = 0.5;
  const ROSE = "#B76E79", ROSE_LIGHT = "#E8C4C8", ROSE_DARK = "#8C4A52";

  function getHeartPath(cx, cy, size) {
    // Returns array of points forming a heart
    const points = [];
    for (let i = 0; i <= 360; i += 2) {
      const rad = (i * Math.PI) / 180;
      const x = cx + size * 16 * Math.pow(Math.sin(rad), 3) / 17;
      const y = cy - size * (13 * Math.cos(rad) - 5 * Math.cos(2*rad) - 2 * Math.cos(3*rad) - Math.cos(4*rad)) / 17;
      points.push({ x, y });
    }
    return points;
  }

  function initHeartAnimation() {
    hCanvas = document.getElementById("monogram-canvas");
    if (!hCanvas) return;
    hCtx = hCanvas.getContext("2d");
    resizeHeartCanvas();
    window.addEventListener("resize", resizeHeartCanvas);
    requestAnimationFrame(animateHeart);
  }

  function resizeHeartCanvas() {
    const container = hCanvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    hW = rect.width;
    hH = rect.height;
    hCanvas.width = hW * dpr;
    hCanvas.height = hH * dpr;
    hCanvas.style.width = hW + "px";
    hCanvas.style.height = hH + "px";
    hCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function animateHeart(timestamp) {
    animTime++;
    hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);

    const cx = hW / 2;
    const cy = hH * 0.45;
    const heartSize = Math.min(hW * 0.16, 70);
    const points = getHeartPath(cx, cy, heartSize);

    if (animPhase === 0) {
      // Phase 0: Draw heart stroke progressively
      heartProgress += 0.008;
      const drawCount = Math.floor(points.length * Math.min(heartProgress, 1));

      hCtx.save();
      hCtx.strokeStyle = ROSE;
      hCtx.lineWidth = 2.5;
      hCtx.shadowColor = ROSE;
      hCtx.shadowBlur = 12;
      hCtx.lineCap = "round";
      hCtx.lineJoin = "round";

      if (drawCount > 1) {
        hCtx.beginPath();
        hCtx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < drawCount; i++) {
          hCtx.lineTo(points[i].x, points[i].y);
        }
        hCtx.stroke();

        // Glowing tip
        const tip = points[drawCount - 1];
        hCtx.beginPath();
        hCtx.arc(tip.x, tip.y, 4, 0, Math.PI * 2);
        hCtx.fillStyle = ROSE_LIGHT;
        hCtx.shadowBlur = 20;
        hCtx.fill();
      }
      hCtx.restore();

      if (heartProgress >= 1.0) { animPhase = 1; heartPulse = 0; }
    }

    if (animPhase === 1) {
      // Phase 1: Heart pulses twice
      heartPulse += 0.03;
      const scale = 1 + Math.sin(heartPulse * Math.PI) * 0.08;
      const pulseOpacity = 1;

      hCtx.save();
      hCtx.translate(cx, cy);
      hCtx.scale(scale, scale);
      hCtx.translate(-cx, -cy);

      hCtx.strokeStyle = ROSE;
      hCtx.lineWidth = 2.5;
      hCtx.shadowColor = ROSE;
      hCtx.shadowBlur = 15 + Math.sin(heartPulse * Math.PI) * 10;
      hCtx.globalAlpha = pulseOpacity;
      hCtx.lineCap = "round";

      hCtx.beginPath();
      hCtx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) hCtx.lineTo(points[i].x, points[i].y);
      hCtx.closePath();
      hCtx.stroke();

      // Soft fill
      hCtx.fillStyle = "rgba(183, 110, 121, 0.06)";
      hCtx.shadowBlur = 0;
      hCtx.fill();

      hCtx.restore();

      if (heartPulse >= 2.0) { animPhase = 2; }
    }

    if (animPhase === 2) {
      // Phase 2: Heart fades, initials appear
      heartOpacity = Math.max(0, heartOpacity - 0.015);
      initialsOpacity = Math.min(1, initialsOpacity + 0.012);
      initialsScale = Math.min(1, initialsScale + 0.008);

      // Fading heart
      if (heartOpacity > 0) {
        hCtx.save();
        hCtx.globalAlpha = heartOpacity;
        hCtx.strokeStyle = ROSE;
        hCtx.lineWidth = 2;
        hCtx.shadowColor = ROSE;
        hCtx.shadowBlur = 8;
        hCtx.beginPath();
        hCtx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) hCtx.lineTo(points[i].x, points[i].y);
        hCtx.closePath();
        hCtx.stroke();
        hCtx.restore();
      }

      // Rising initials
      const isAr = currentLang === "ar";
      const fontSize = Math.min(hW * 0.16, 90);
      const eased = 1 - Math.pow(1 - Math.min(initialsScale, 1), 3);

      hCtx.save();
      hCtx.globalAlpha = initialsOpacity;
      hCtx.translate(cx, cy);
      hCtx.scale(eased, eased);
      hCtx.translate(-cx, -cy);

      const glow = 12 + Math.sin(animTime * 0.03) * 5;
      hCtx.shadowColor = ROSE;
      hCtx.shadowBlur = glow;
      hCtx.font = `bold ${fontSize}px ${isAr ? "Tajawal" : "Playfair Display"}`;
      hCtx.fillStyle = ROSE;
      hCtx.textAlign = "center";
      hCtx.textBaseline = "middle";

      const spacing = Math.min(hW * 0.18, 110);
      const l1 = isAr ? "و" : "H";
      const l2 = isAr ? "ه" : "W";

      hCtx.fillText(l1, cx - spacing, cy);
      hCtx.fillText(l2, cx + spacing, cy);

      // Ampersand
      hCtx.font = `${fontSize * 0.45}px "Playfair Display"`;
      hCtx.fillStyle = ROSE_LIGHT;
      hCtx.shadowBlur = glow * 0.6;
      hCtx.fillText("&", cx, cy);

      // Names below
      const nameOpacity = Math.max(0, (initialsOpacity - 0.5) * 2);
      hCtx.globalAlpha = nameOpacity;
      const ns = Math.min(hW * 0.04, 24);
      hCtx.font = `${ns}px ${isAr ? "Tajawal" : "Playfair Display"}`;
      hCtx.fillStyle = ROSE_DARK;
      hCtx.shadowBlur = 0;
      hCtx.fillText(isAr ? "هشام & وجدان" : "Hesham & Wejdan", cx, cy + fontSize * 0.65);

      hCtx.restore();
    }

    // Continuous shimmer particles around the heart/initials area
    if (animPhase >= 1) {
      for (let i = 0; i < 2; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = heartSize * 14 / 17 + Math.random() * 20;
        const px = cx + Math.cos(angle) * dist;
        const py = cy + Math.sin(angle) * dist * 0.8;
        hCtx.save();
        hCtx.globalAlpha = Math.random() * 0.4 + 0.1;
        hCtx.fillStyle = ROSE_LIGHT;
        hCtx.shadowColor = ROSE;
        hCtx.shadowBlur = 4;
        hCtx.beginPath();
        hCtx.arc(px, py, Math.random() * 2 + 0.5, 0, Math.PI * 2);
        hCtx.fill();
        hCtx.restore();
      }
    }

    requestAnimationFrame(animateHeart);
  }

  function updateCountdown() {
    const el = $("countdown");
    const diff = WEDDING_DATE - new Date();
    if (diff <= 0) {
      el.innerHTML = `<div class="wedding-day-msg">${t("weddingDay")}</div>`;
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff / 3600000) % 24);
    const m = Math.floor((diff / 60000) % 60);
    const s = Math.floor((diff / 1000) % 60);

    // Max values for ring fill calculation
    const maxD = 365; // show proportion of a year
    const items = [
      { val: d, max: maxD, label: t("days") },
      { val: h, max: 24, label: t("hours") },
      { val: m, max: 60, label: t("minutes") },
      { val: s, max: 60, label: t("seconds") },
    ];

    const radius = 40;
    const circumference = 2 * Math.PI * radius;

    el.innerHTML = items.map(item => {
      const pct = item.val / item.max;
      const offset = circumference * (1 - pct);
      return `
        <div class="countdown-ring">
          <svg viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="${radius}"/>
            <circle class="ring-fill" cx="50" cy="50" r="${radius}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="countdown-ring-content">
            <span class="countdown-ring-number">${item.val}</span>
            <span class="countdown-ring-label">${item.label}</span>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderPagination(totalItems, totalPages) {
    const isAr = currentLang === "ar";
    const prevLabel = isAr ? "السابق" : "Prev";
    const nextLabel = isAr ? "التالي" : "Next";

    let html = "";

    // Page size selector
    html += `<select onchange="pageSize=Number(this.value);currentPage=1;renderGuestTable()">`;
    [10, 25, 50, 100].forEach(s => {
      html += `<option value="${s}" ${pageSize === s ? "selected" : ""}>${s}</option>`;
    });
    html += `</select>`;

    // Prev button
    html += `<button ${currentPage <= 1 ? "disabled" : ""} onclick="currentPage--;renderGuestTable()">${prevLabel}</button>`;

    // Page buttons
    const maxButtons = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
    let endPage = Math.min(totalPages, startPage + maxButtons - 1);
    if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

    if (startPage > 1) {
      html += `<button onclick="currentPage=1;renderGuestTable()">1</button>`;
      if (startPage > 2) html += `<span class="page-info">...</span>`;
    }
    for (let i = startPage; i <= endPage; i++) {
      html += `<button class="${i === currentPage ? "active" : ""}" onclick="currentPage=${i};renderGuestTable()">${i}</button>`;
    }
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) html += `<span class="page-info">...</span>`;
      html += `<button onclick="currentPage=${totalPages};renderGuestTable()">${totalPages}</button>`;
    }

    // Next button
    html += `<button ${currentPage >= totalPages ? "disabled" : ""} onclick="currentPage++;renderGuestTable()">${nextLabel}</button>`;

    // Info
    const from = (currentPage - 1) * pageSize + 1;
    const to = Math.min(currentPage * pageSize, totalItems);
    html += `<span class="page-info">${from}-${to} / ${totalItems}</span>`;

    $("pagination").innerHTML = html;
  }

  function parseBool(val) {

    if (typeof val === "string") { const v = val.trim().toLowerCase(); return v === "yes" || v === "نعم" || v === "true" || v === "1"; }

  function handleExport() {
    const guests = getGuests();
    const isAr = currentLang === "ar";
    const headers = isAr ? ["الاسم","رقم الجوال","تم الاعتذار","تم القبول","الأطفال","ملاحظات"] : ["Name","Phone","Apologized","Accepted","Children","Notes"];
    const yesNo = (v) => v ? t("yes") : t("no");
    const rows = guests.map(g => [g.name||"",g.phone||"",yesNo(g.communicated),yesNo(g.confirmed),(g.children||[]).map(c=>c.name).join(", "),g.notes||""]);
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws["!cols"] = headers.map((h,i) => ({ wch: Math.min(Math.max(h.length, ...rows.map(r => String(r[i]).length)) + 4, 40) }));
    const sheetName = currentTab === "groom_guests" ? (isAr ? "قائمة_العريس" : "Groom_Guests") : (isAr ? "قائمة_العروس" : "Bride_Guests");
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, `${sheetName}.xlsx`);
  }

  async function handleImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: "array" });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const guests = rows.map(row => ({
        name: row["الاسم"]||row["Name"]||row["name"]||"",
        phone: String(row["رقم الجوال"]||row["Phone"]||row["phone"]||""),
        communicated: parseBool(row["تم الاعتذار"]||row["تم التواصل"]||row["Apologized"]||row["Communicated"]||row["communicated"]),
        confirmed: parseBool(row["تم القبول"]||row["تم التأكيد"]||row["Accepted"]||row["Confirmed"]||row["confirmed"]),
        children: (row["الأطفال"]||row["Children"]||row["children"]||"").toString().split(",").map(s=>s.trim()).filter(Boolean).map(name=>({name})),
        notes: row["ملاحظات"]||row["Notes"]||row["notes"]||"",
      }));
      await Promise.all(guests.map(g => addGuestDoc(currentTab, g)));
      showToast(t("importSuccess").replace("{count}", guests.length), "success");
    } catch (err) { console.error(err); showToast(t("importError"), "error"); }
    $("file-input").value = "";
  }

  function handleDownloadTemplate() {
    const isAr = currentLang === "ar";
    const headers = isAr
      ? ["الاسم","رقم الجوال","تم القبول","تم الاعتذار","الأطفال","ملاحظات"]
      : ["Name","Phone","Accepted","Apologized","Children","Notes"];
    const example = isAr
      ? ["محمد أحمد","0501234567","نعم","لا","سارة, علي","ملاحظة"]
      : ["John Doe","0501234567","Yes","No","Sara, Ali","Note"];
    const ws = XLSX.utils.aoa_to_sheet([headers, example]);
    ws["!cols"] = headers.map((h,i) => ({ wch: Math.max(h.length, String(example[i]).length) + 4 }));
    const wb = XLSX.utils.book_new();
    const sheetName = isAr ? "قالب_المدعوين" : "Guest_Template";
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, `${sheetName}.xlsx`);
  }

  // ==========================================
  // TOAST
  // ==========================================
  function showToast(message, type) {
    const toast = document.createElement("div");
    toast.className = `toast ${type || ""}`;
    toast.textContent = message;
    $("toast-container").appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ==========================================
  // INIT
  // ==========================================
  function init() {
    setLanguage(currentLang);
    initPetals();
    initHeartAnimation();
    updateCountdown();
    setInterval(updateCountdown, 1000);

    $("lang-toggle").addEventListener("click", () => {
      currentLang = currentLang === "ar" ? "en" : "ar";
      setLanguage(currentLang);
      // Reset heart animation for language change
      animPhase = 2; heartOpacity = 0; initialsOpacity = 0; initialsScale = 0.5;
      renderAll();
    });

    $("groom-tab").addEventListener("click", () => switchTab("groom_guests"));
    $("bride-tab").addEventListener("click", () => switchTab("bride_guests"));
    $("search-input").addEventListener("input", (e) => { searchQuery = e.target.value.toLowerCase(); currentPage = 1; renderGuestTable(); });
    $("add-guest-btn").addEventListener("click", openAddModal);
    $("import-btn").addEventListener("click", () => $("file-input").click());
    $("export-btn").addEventListener("click", handleExport);
    $("template-btn").addEventListener("click", handleDownloadTemplate);
    $("file-input").addEventListener("change", handleImport);
    $("modal-overlay").addEventListener("click", (e) => { if (e.target === $("modal-overlay")) closeModal(); });
    $("confirm-overlay").addEventListener("click", (e) => { if (e.target === $("confirm-overlay")) closeConfirm(); });
    $("confirm-yes").addEventListener("click", async () => {
      if (pendingDeleteId) { try { await deleteGuestDoc(currentTab, pendingDeleteId); } catch (err) { showToast(err.message, "error"); } }
      closeConfirm();
    });
    $("confirm-no").addEventListener("click", closeConfirm);

    function onFirestoreError(err) {
      console.error(err);
      $("error-banner").textContent = t("connectionError") + " (" + err.message + ")";
      $("error-banner").classList.add("show");
      renderGuestTable();
    }

    subscribeToGuests("groom_guests", (guests) => { groomGuests = guests; if (currentTab === "groom_guests") { renderSummary(); renderGuestTable(); } }, onFirestoreError);
    subscribeToGuests("bride_guests", (guests) => { brideGuests = guests; if (currentTab === "bride_guests") { renderSummary(); renderGuestTable(); } }, onFirestoreError);

    renderAll();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
  </script>
</body>
</html>
